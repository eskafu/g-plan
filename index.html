<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>g-plan</title>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111;
    --border: #222;
    --text: #b0b0b0;
    --dim: #555;
    --amber: #c88a2e;
  }
  * { margin:0; padding:0; box-sizing:border-box }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
  }
  .app { max-width: 800px; margin:0 auto; padding:3rem 1.5rem }
  header {
    text-align: center; margin-bottom: 3rem;
    border-bottom: 1px solid var(--border); padding-bottom: 2rem;
  }
  header h2 {
    font-weight: 200; font-size: 1.8rem; letter-spacing: .06em; color:#e0e0e0;
  }
  header h2 span { color: var(--amber) }
  header p { color: var(--dim); margin-top:.5rem; font-size:.85rem }
  .project-list { display: flex; flex-direction: column; gap: 1rem }
  .project-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 1.3rem 1.5rem;
    display: flex; justify-content: space-between; align-items: center;
    text-decoration: none; color: inherit;
    transition: border-color .2s;
  }
  .project-card:hover { border-color: var(--amber) }
  .project-card h3 { font-weight: 500; font-size: 1.05rem; color:#d0d0d0 }
  .project-card .desc { font-size: .78rem; color: var(--dim); margin-top:.2rem }
  .project-card .arrow { color: var(--dim); font-size: 1.2rem }
  .back-link { text-align: center; margin-top: 2rem }
  .back-link a { color: var(--amber); text-decoration: none; font-size: .85rem }
  .back-link a:hover { text-decoration: underline }
  footer { text-align: center; color: #2a2a2a; font-size:.7rem; margin-top:3rem }
</style>
</head>
<body>
<div class="app">
  <header>
    <h2>g-<span>plan</span></h2>
    <p>Produção · datasheets · assistência de direção</p>
  </header>
  <div class="project-list" id="projects"></div>
  <div class="back-link"><a href="../">← G-OS</a></div>
  <footer>g-plan · <span id="ts"></span></footer>
</div>
<script>
  const PROJECTS = [
    { name: 'ANP26 Drone Brief', desc: 'Afro Nation Portugal 2026 · plano drone/FPV · Spotify · schedules', path: 'anp26-drone/' },
    { name: 'So Rio', desc: 'Plano de filmagens · Náuticas, Bar, Pessoas, Pagode · EM PRODUÇÃO 📅 28 Junho 2026', path: 'so-rio/' },
    { name: 'Homem na Paragem', desc: 'Curta-metragem AI · drama urbano noturno', path: 'homem-na-paragem/' },
  ];
  document.getElementById('ts').textContent = new Date().toISOString().slice(0,10);
  document.getElementById('projects').innerHTML = PROJECTS.map(p =>
    `<a class="project-card" href="${p.path}">
      <div><h3>${p.name}</h3><div class="desc">${p.desc}</div></div>
      <div class="arrow">→</div></a>`
  ).join('');
</script>
</body>
</html>
