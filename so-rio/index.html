<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SORIO · 28 Junho</title>
<style>
  :root {
    --bg: #0d0d0d;
    --card: #161616;
    --border: #2a2a2a;
    --text: #d4d4d4;
    --text2: #aaa;
    --dim: #777;
    --accent: #e6a817;
    --naut-c: #2980b9;
    --bar-c: #e67e22;
    --pessoas-c: #16a085;
    --pagode-c: #8e44ad;
    --pickup-c: #27ae60;
    --chk-done: #1a7a2e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
    padding-bottom: 80px;
  }

  /* ── LOCK ── */
  .lock-screen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
    transition: opacity 0.4s, visibility 0.4s;
  }
  .lock-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
  .lock-logo { font-size: 28px; font-weight: 200; letter-spacing: 4px; margin-bottom: 6px; }
  .lock-logo span { color: var(--accent); }
  .lock-sub { font-size: 10px; color: var(--dim); letter-spacing: 2px; margin-bottom: 28px; text-transform: uppercase; }
  .lock-input {
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); font-size: 15px; padding: 10px 16px;
    border-radius: 6px; width: 220px; text-align: center;
    outline: none; letter-spacing: 2px;
  }
  .lock-input:focus { border-color: var(--accent); }
  .lock-error { font-size: 10px; color: #c0392b; margin-top: 8px; min-height: 14px; }
  .lock-shake { animation: shake 0.4s ease; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  /* ── MAIN ── */
  .main { max-width: 500px; margin: 0 auto; padding: 16px 12px; }

  /* ── HEADER ── */
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .back-btn { font-size: 18px; color: var(--dim); text-decoration: none; padding: 8px; }
  .topbar h1 { font-size: 17px; font-weight: 500; }
  .topbar h1 span { color: var(--accent); }

  /* ── INFO STRIP ── */
  .info-strip {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px; margin-bottom: 12px;
    display: flex; flex-wrap: wrap; gap: 6px 16px;
    font-size: 10px; color: var(--text2);
  }
  .info-strip .warn { color: #e67e22; }
  .info-strip .good { color: #27ae60; }

  /* ── PROGRESS ── */
  .progress-bar-wrap {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px; margin-bottom: 4px;
  }
  .progress-label { display: flex; justify-content: space-between; font-size: 10px; color: var(--dim); margin-bottom: 4px; }
  .progress-track { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }

  /* ── BLOCK ── */
  .block { margin-top: 14px; }
  .block-header {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 0 8px;
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.5px; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .block-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .dot-naut { background: var(--naut-c); }
  .dot-bar { background: var(--bar-c); }
  .dot-pessoas { background: var(--pessoas-c); }
  .dot-pagode { background: var(--pagode-c); }
  .dot-pickup { background: var(--pickup-c); }
  .block-count { font-size: 9px; color: var(--dim); margin-left: auto; }
  .block-arrow { font-size: 10px; color: var(--dim); transition: transform 0.2s; }
  .block-collapsed .block-arrow { transform: rotate(-90deg); }
  .block-shots { transition: max-height 0.3s ease; overflow: hidden; }
  .block-collapsed .block-shots { max-height: 0 !important; }

  /* ── SHOT CARD ── */
  .shot-row {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 8px; margin-bottom: 2px;
    border-radius: 6px; font-size: 10.5px;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .shot-row:active { background: #1a1a1a; }
  .shot-row.done { opacity: 0.55; }
  .shot-row.done .shot-desc { text-decoration: line-through; text-decoration-color: #444; }

  .shot-chk {
    width: 22px; height: 22px; min-width: 22px;
    border: 1.5px solid #444; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 12px; color: transparent;
    transition: all 0.15s;
    touch-action: manipulation;
  }
  .shot-row.done .shot-chk { border-color: var(--chk-done); background: var(--chk-done); color: #fff; }
  .shot-id { font-weight: 600; font-size: 10px; min-width: 20px; color: var(--accent); }
  .shot-info { flex: 1; min-width: 0; }
  .shot-desc { line-height: 1.35; }
  .shot-meta { font-size: 9px; color: var(--dim); margin-top: 1px; }
  .shot-eq { font-size: 9px; color: #888; min-width: 36px; text-align: right; white-space: nowrap; }

  /* ── TIMELINE BAR ── */
  .timeline {
    display: flex; height: 5px; border-radius: 2px; overflow: hidden; margin: 10px 0 2px;
  }
  .tl-n { background: var(--naut-c); flex: 2; }
  .tl-b { background: var(--bar-c); }
  .tl-e { background: var(--pessoas-c); }
  .tl-p { background: var(--pagode-c); flex: 3; }
  .tl-pu { background: var(--pickup-c); }

  /* ── UTILS ── */
  .reset-btn {
    display: block; margin: 20px auto 0;
    background: none; border: 1px solid var(--border);
    color: var(--dim); font-size: 10px; padding: 6px 14px;
    border-radius: 16px; cursor: pointer;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }
</style>
</head>
<body>

<div class="lock-screen" id="lockscreen">
  <div class="lock-logo">S<span>O</span>RIO</div>
  <div class="lock-sub">28 Junho · Plano de Filmagens</div>
  <input type="password" class="lock-input" id="pwinput" placeholder="••••••••">
  <div class="lock-error" id="lckerr"></div>
</div>

<div class="main" id="main" style="display:none">
  <div class="topbar">
    <a href="../" class="back-btn">←</a>
    <h1>S<span>O</span> RIO</h1>
    <div style="width:28px"></div>
  </div>

  <div class="info-strip">
    <span>📅 28 Junho 2026</span>
    <span>📍 Valada do Ribatejo</span>
    <span>☀️ 06:10 – 21:04</span>
    <span class="warn">🌅 Golden ~20h30</span>
    <span class="good">🌳 Sombra árvores</span>
    <span>🎵 Pagode 16h</span>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-label">
      <span>Progresso</span>
      <span id="prog-text">0 / 39</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>

  <div class="timeline">
    <div class="tl-n"></div>
    <div class="tl-b" style="flex:1.5"></div>
    <div class="tl-e" style="flex:1.5"></div>
    <div class="tl-p" style="flex:4"></div>
    <div class="tl-pu" style="flex:1.5"></div>
  </div>

  <div id="blocks"></div>

  <button class="reset-btn" onclick="resetAll()">🔄 Reiniciar checkboxes</button>
</div>

<script>
const EXPECTED_HASH = '4bc7855012ab13654b040b0132458481c3adc356dc8fcbecd0c0c35acbfe4486';
const AUTH_KEY = '***';
const LS_KEY = '***';

// ── SHOT DATABASE ──
const BLOCKS = [
  {
    id: 'naut', icon: '🛶', dot: 'dot-naut',
    label: 'Bloco 1 — Atividades Náuticas',
    time: '13:00–14:30 · 90 min',
    shots: [
      {id:'N1',eq:'🚁',desc:'Wide aéreo: rio, zona náutica, esplanada — establishing geral',meta:'1ª bat'},
      {id:'N2',eq:'🚁',desc:'Top-down: paddleboards, insuflável, canoes — layout atividades',meta:''},
      {id:'N3',eq:'🎥',desc:'Insuflável NOVO: crianças/adultos a saltar, cair na água — close action',meta:'🔑 PRIORIDADE'},
      {id:'N4',eq:'🎥60',desc:'Slow-mo: salto do insuflável → entrada na água — explosão',meta:'Abaixo da água se possível'},
      {id:'N5',eq:'🎥',desc:'Paddleboard: pessoas em pé, remar, equilíbrio',meta:'Dinâmica + água a espirrar'},
      {id:'N6',eq:'🎥',desc:'Canoa/kayak: tracking rente à água, movimento fluído',meta:''},
      {id:'N7',eq:'📷',desc:'POV na água: salto, submersão, superfície',meta:'GoPro à prova d\u0027água'},
      {id:'N8',eq:'🎥',desc:'Famílias/grupos a preparar-se: coletes, pranchas, alegria',meta:'Emoção + interação'},
      {id:'N9',eq:'🚁',desc:'Órbita zona náutica: insuflável + paddle + rio em plano',meta:'2ª bat'},
      {id:'N10',eq:'🎥',desc:'Detalhes: coletes, cordas, toldos, pés na água',meta:''}
    ]
  },
  {
    id: 'bar', icon: '🍸', dot: 'dot-bar',
    label: 'Bloco 2 — Bar & Cocktails',
    time: '14:30–15:30 · 60 min',
    shots: [
      {id:'B1',eq:'🎥60',desc:'Slow-mo: mãos a preparar cocktail — gelo, shaker, verter',meta:'Coordenar bartender'},
      {id:'B2',eq:'🎥',desc:'Wide bar: esplanada meio-dia, gente a chegar',meta:''},
      {id:'B3',eq:'🎥',desc:'Close-up copo: cocktail pronto, fundo rio desfocado',meta:'Fundo rio = diff'},
      {id:'B4',eq:'🎥',desc:'Slide lateral: fileira cocktails no balcão',meta:''},
      {id:'B5',eq:'🎥',desc:'Ambiente bar: balcão, garrafas, bartender em ação',meta:''},
      {id:'B6',eq:'🎥',desc:'Detalhe ingredientes: fruta, ervas, gelo, copos',meta:''},
      {id:'B7',eq:'🎥',desc:'Brinde: 2+ copos, câmara baixa, contraluz rio',meta:'Provocar'}
    ]
  },
  {
    id: 'pessoas', icon: '👥', dot: 'dot-pessoas',
    label: 'Bloco 3 — Pessoas & Espírito',
    time: '15:30–16:00 · 30 min',
    shots: [
      {id:'E1',eq:'🎥',desc:'Esplanada em movimento: gente a rir, conversar, relaxar',meta:'Fotogénico, sol+árvores'},
      {id:'E2',eq:'🎥',desc:'Grupos à mesa: brindes espontâneos, reações naturais',meta:'🔑 Prioridade — verdade'},
      {id:'E3',eq:'🎥',desc:'Close-up rostos: expressões de sol, calor, descontração',meta:'Luz árvore = bonita'},
      {id:'E4',eq:'🎥',desc:'Caminho rio → esplanada: tracking pessoas a chegar',meta:''},
      {id:'E5',eq:'🎥',desc:'Pessoas na água (pés, sentadas beira-rio): refresco',meta:''},
      {id:'E6',eq:'🎥',desc:'Plano "assinatura" SORIO: rio + esplanada + gente em 1 plano',meta:''}
    ]
  },
  {
    id: 'pagode', icon: '🎵', dot: 'dot-pagode',
    label: 'Bloco 4 — Pagode do Elias',
    time: '16:00–17:30 · 90 min',
    shots: [
      {id:'P1',eq:'🎥',desc:'Wide: roda de samba + músicos + público',meta:'Áudio 30s ref'},
      {id:'P2',eq:'🎥',desc:'Detalhe instrumentos: mãos na viola, pandeiro, cavaquinho',meta:''},
      {id:'P3',eq:'🎥',desc:'Close-up músicos: rostos, expressões a tocar',meta:''},
      {id:'P4',eq:'🎥',desc:'Público a curtir: pessoas a cantar, sorrir, dançar',meta:'🔑 Prioridade'},
      {id:'P5',eq:'🎥',desc:'Brindes espontâneos: grupos a brindar c/ cocktails',meta:'Provocar'},
      {id:'P6',eq:'🎥',desc:'Tracking lateral: esplanada viva (rio+evento)',meta:''},
      {id:'P7',eq:'🚁',desc:'Órbita alta esplanada + rio',meta:'Só se não incomodar'}
    ]
  },
  {
    id: 'pickups', icon: '🔄', dot: 'dot-pickup',
    label: 'Bloco 5 — Pickups Finais',
    time: '17:30–18:00 · 30 min',
    shots: [
      {id:'F1',eq:'🚁',desc:'Repetir N1/N2 — zona náutica agora com mais gente',meta:'3ª bat'},
      {id:'F2',eq:'🎥',desc:'Cocktails à luz do fim de tarde: copos dourados',meta:''},
      {id:'F3',eq:'🎥',desc:'Entrada/saída: movimento natural de pessoas',meta:''},
      {id:'F4',eq:'🎥',desc:'Staff em ação: bartender, empregados, coordenador atividades',meta:''},
      {id:'F5',eq:'🎥',desc:'Wide final: rio + esplanada loteada — "esta é a vibe"',meta:''}
    ]
  }
];

// ── AUTH ──
async function checkPw(input) {
  const hash = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(input));
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
}

const lockScreen = document.getElementById('lockscreen');
const pwInput = document.getElementById('pwinput');
const lckErr = document.getElementById('lckerr');

pwInput.addEventListener('keydown', async (e) => {
  if (e.key !== 'Enter') { lckErr.textContent = ''; return; }
  const hash = await checkPw(pwInput.value);
  if (hash === EXPECTED_HASH) {
    sessionStorage.setItem(AUTH_KEY, '1');
    lockScreen.classList.add('hidden');
    document.getElementById('main').style.display = 'block';
    init();
  } else {
    lckErr.textContent = 'Password errada';
    pwInput.classList.add('lock-shake');
    setTimeout(() => pwInput.classList.remove('lock-shake'), 400);
    pwInput.select();
  }
});

// ── INIT ──
if (sessionStorage.getItem(AUTH_KEY) === '1') {
  lockScreen.classList.add('hidden');
  document.getElementById('main').style.display = 'block';
  init();
}

function getChecked() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; }
  catch { return {}; }
}
function saveChecked(obj) { localStorage.setItem(LS_KEY, JSON.stringify(obj)); }

function init() {
  const checked = getChecked();
  const container = document.getElementById('blocks');
  let totalChecked = 0;
  let totalShots = 0;

  container.innerHTML = BLOCKS.map(block => {
    let blockChecked = 0;
    const shotsHTML = block.shots.map(s => {
      totalShots++;
      const isChecked = checked[s.id] === true;
      if (isChecked) { blockChecked++; totalChecked++; }
      return `
        <div class="shot-row${isChecked?' done':''}" data-shot="${s.id}">
          <div class="shot-chk" onclick="toggleShot('${s.id}',this)">✓</div>
          <div class="shot-id">${s.id}</div>
          <div class="shot-info">
            <div class="shot-desc">${s.desc}</div>
            ${s.meta ? `<div class="shot-meta">${s.meta}</div>` : ''}
          </div>
          <div class="shot-eq">${s.eq}</div>
        </div>`;
    }).join('');

    const doneLabel = blockChecked === block.shots.length ? ' ✅' : ` ${blockChecked}/${block.shots.length}`;
    return `
      <div class="block" id="block-${block.id}">
        <div class="block-header" onclick="toggleBlock('${block.id}')">
          <div class="block-dot ${block.dot}"></div>
          ${block.icon} ${block.label}
          <span class="block-count">${block.time}${doneLabel}</span>
          <span class="block-arrow">▼</span>
        </div>
        <div class="block-shots" style="max-height:${block.shots.length * 45}px">${shotsHTML}</div>
      </div>`;
  }).join('');

  updateProgress(totalChecked, totalShots);
}

function toggleShot(id, el) {
  const checked = getChecked();
  checked[id] = !checked[id];
  saveChecked(checked);
  const row = el.parentElement;
  row.classList.toggle('done', checked[id]);

  // Recount
  let totalChecked = 0, totalShots = 0;
  BLOCKS.forEach(block => {
    block.shots.forEach(s => {
      totalShots++;
      if (checked[s.id]) totalChecked++;
    });
  });
  updateProgress(totalChecked, totalShots);
}

function updateProgress(checked, total) {
  document.getElementById('prog-text').textContent = `${checked} / ${total}`;
  document.getElementById('prog-fill').style.width = total ? `${(checked/total)*100}%` : '0%';
}

function toggleBlock(id) {
  document.getElementById('block-'+id).classList.toggle('block-collapsed');
}

function resetAll() {
  if (confirm('Apagar todos os checkboxes?')) {
    localStorage.removeItem(LS_KEY);
    init();
  }
}
</script>

</body>
</html>
